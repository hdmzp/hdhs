<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-콘텐츠 주간 시청률 대시보드</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --success: #10b981;
            --success-light: #ecfdf5;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 40px 20px;
            color: var(--text-main);
            line-height: 1.5;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 35px;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 10px;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .btn {
            background-color: #fff;
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 1px 2px rgb(0 0 0 / 0.05);
            transition: all 0.2s;
        }
        .btn:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
        }
        .current-week {
            font-size: 1.3rem;
            font-weight: 800;
            background-color: var(--primary);
            color: white;
            padding: 10px 28px;
            border-radius: 30px;
            min-width: 160px;
            text-align: center;
            box-shadow: 0 4px 12px rgb(37 99 235 / 0.2);
        }
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 35px;
        }
        .tab {
            background-color: #fff;
            border: 1px solid var(--border);
            padding: 8px 22px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .tab.active {
            background-color: var(--text-main);
            color: white;
            border-color: var(--text-main);
        }
        .grid-table {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05);
            overflow: hidden;
        }
        .table-row {
            display: grid;
            grid-template-columns: 120px repeat(7, 1fr);
            border-bottom: 1px solid var(--border);
        }
        .table-row:last-child {
            border-bottom: none;
        }
        .table-header {
            font-weight: 700;
            text-align: center;
            padding: 16px;
            background-color: #f1f5f9;
            font-size: 0.95rem;
            color: #475569;
        }
        .category-cell {
            font-weight: 800;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8fafc;
            border-right: 1px solid var(--border);
            letter-spacing: -0.03em;
        }
        .day-cell {
            padding: 20px 12px;
            border-right: 1px solid var(--border);
            min-height: 240px;
            background-color: #fff;
            transition: background-color 0.2s;
        }
        .day-cell:last-child {
            border-right: none;
        }
        .card {
            background: #fff;
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 0.88rem;
            box-shadow: 0 2px 4px rgb(0 0 0 / 0.02);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgb(0 0 0 / 0.06);
        }
        .card.variety {
            border-left-color: var(--success);
        }
        .card-title {
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
            font-size: 0.92rem;
            word-break: keep-all;
        }
        .card-info {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        .card-rating-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card-rating {
            font-weight: 800;
            color: #ef4444;
            font-size: 0.95rem;
        }
        .card-date {
            color: #94a3b8;
            font-size: 0.75rem;
        }
        .hidden {
            display: none !important;
        }
        .status-footer {
            text-align: right;
            margin-top: 15px;
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎬 K-콘텐츠 주간 시청률 대시보드</h1>
    </div>

    <div class="controls">
        <button class="btn" onclick="moveWeek(-1)">◀ 이전 주</button>
        <div id="weekDisplay" class="current-week">Loading...</div>
        <button class="btn" onclick="moveWeek(1)">다음 주 ▶</button>
    </div>

    <div class="filter-tabs">
        <button id="tab-all" class="tab active" onclick="filterCategory('all')">전체</button>
        <button id="tab-drama" class="tab" onclick="filterCategory('drama')">드라마</button>
        <button id="tab-variety" class="tab" onclick="filterCategory('variety')">예능</button>
    </div>

    <div class="grid-table">
        <div class="table-row">
            <div class="table-header" style="background-color: #e2e8f0; font-weight: 800;">구분</div>
            <div class="table-header">월</div>
            <div class="table-header">화</div>
            <div class="table-header">수</div>
            <div class="table-header">목</div>
            <div class="table-header">금</div>
            <div class="table-header">토</div>
            <div class="table-header">일</div>
        </div>

        <div id="row-drama" class="table-row">
            <div class="category-cell" style="color: var(--primary);">드라마</div>
            <div id="drama-월" class="day-cell"></div>
            <div id="drama-화" class="day-cell"></div>
            <div id="drama-수" class="day-cell"></div>
            <div id="drama-목" class="day-cell"></div>
            <div id="drama-금" class="day-cell"></div>
            <div id="drama-토" class="day-cell"></div>
            <div id="drama-일" class="day-cell"></div>
        </div>

        <div id="row-variety" class="table-row">
            <div class="category-cell" style="color: var(--success);">예능</div>
            <div id="variety-월" class="day-cell"></div>
            <div id="variety-화" class="day-cell"></div>
            <div id="variety-수" class="day-cell"></div>
            <div id="variety-목" class="day-cell"></div>
            <div id="variety-금" class="day-cell"></div>
            <div id="variety-토" class="day-cell"></div>
            <div id="variety-일" class="day-cell"></div>
        </div>
    </div>
    
    <div id="statusFooter" class="status-footer"></div>
</div>

<script>
    let currentDate = new Date();
    let currentFilter = 'all';

    // 💡 백엔드와 완벽하게 대칭을 이루는 달 목요일 기준 표준 주차 연산 알고리즘
    function getWeekOfMonthString(date) {
        const target = new Date(date.getTime());
        const firstDay = new Date(target.getFullYear(), target.getMonth(), 1);
        
        const firstThursday = new Date(firstDay.getTime());
        firstThursday.setDate(firstDay.getDate() + (3 - (firstDay.getDay() + 6) % 7));
        
        const limitStart = new Date(firstThursday.getTime());
        limitStart.setDate(limitStart.getDate() - 3);
        if (target < limitStart) {
            const prevMonthLast = new Date(target.getFullYear(), target.getMonth(), 0);
            return getWeekOfMonthString(prevMonthLast);
        }
        
        const nextMonthFirst = new Date(target.getFullYear(), target.getMonth() + 1, 1);
        const nextThursday = new Date(nextMonthFirst.getTime());
        nextThursday.setDate(nextMonthFirst.getDate() + (3 - (nextMonthFirst.getDay() + 6) % 7));
        
        const nextLimitStart = new Date(nextThursday.getTime());
        nextLimitStart.setDate(nextLimitStart.getDate() - 3);
        if (target >= nextLimitStart) {
            return `${nextMonthFirst.getMonth() + 1}월 1주차`;
        }
        
        const weekNumber = Math.floor((target - limitStart) / (7 * 24 * 60 * 60 * 1000)) + 1;
        return `${target.getMonth() + 1}월 ${weekNumber}주차`;
    }

    function clearCells() {
        const days = ["월", "화", "수", "목", "금", "토", "일"];
        days.forEach(day => {
            document.getElementById(`drama-${day}`).innerHTML = "";
            document.getElementById(`variety-${day}`).innerHTML = "";
        });
        document.getElementById("statusFooter").innerText = "";
    }

    // 대분류 탭 스위칭 필터 인터랙션 로직
    function filterCategory(category) {
        currentFilter = category;
        
        document.querySelectorAll('.filter-tabs .tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${category}`).classList.add('active');

        const dramaRow = document.getElementById('row-drama');
        const varietyRow = document.getElementById('row-variety');

        if (category === 'all') {
            dramaRow.classList.remove('hidden');
            varietyRow.classList.remove('hidden');
        } else if (category === 'drama') {
            dramaRow.classList.remove('hidden');
            varietyRow.classList.add('hidden');
        } else if (category === 'variety') {
            dramaRow.classList.add('hidden');
            varietyRow.classList.remove('hidden');
        }
    }

    // 주차별 정적 구조 적재 통합 리퀘스트 펑션
    async function loadDashboardData() {
        clearCells();
        const weekName = getWeekOfMonthString(currentDate);
        document.getElementById("weekDisplay").innerText = weekName;

        // 크롤러 데이터 파이프라인 연동 상대경로 바인딩
        const jsonPath = `../data/dramavariety/${weekName}.json`;

        try {
            const response = await fetch(jsonPath);
            if (!response.ok) throw new Error("데이터 파일 유실");
            
            const data = await response.json();
            
            if (data.collectedAt) {
                document.getElementById("statusFooter").innerText = `최종 동기화 시각: ${data.collectedAt.substring(0, 16).replace('T', ' ')}`;
            }

            const programs = data.programs || [];
            if (programs.length === 0) {
                fillEmptyState();
                return;
            }

            programs.forEach(prog => {
                if (prog.days && Array.isArray(prog.days)) {
                    prog.days.forEach(day => {
                        const cellId = `${prog.category}-${day}`;
                        const cell = document.getElementById(cellId);
                        if (cell) {
                            const cardHtml = `
                                <div class="card ${prog.category}">
                                    <div class="card-title">${prog.title}</div>
                                    <div class="card-info">${prog.channel} | ${prog.time}</div>
                                    <div class="card-rating-container">
                                        <span class="card-rating">${prog.rating}%</span>
                                        <span class="card-date">(${prog.ratingDate})</span>
                                    </div>
                                </div>
                            `;
                            cell.insertAdjacentHTML('beforeend', cardHtml);
                        }
                    });
                }
            });

        } catch (error) {
            fillEmptyState();
        }
    }

    // 데이터가 비어있을 때 깔끔한 대시 슬롯 채우기 헬퍼
    function fillEmptyState() {
        const days = ["월", "화", "수", "목", "금", "토", "일"];
        days.forEach(day => {
            const dCell = document.getElementById(`drama-${day}`);
            const vCell = document.getElementById(`variety-${day}`);
            if (dCell && dCell.innerHTML === "") dCell.innerHTML = `<div style="color:#cbd5e1; text-align:center; padding-top:35px; font-weight:500;">-</div>`;
            if (vCell && vCell.innerHTML === "") vCell.innerHTML = `<div style="color:#cbd5e1; text-align:center; padding-top:35px; font-weight:500;">-</div>`;
        });
    }

    function moveWeek(weeks) {
        currentDate.setDate(currentDate.getDate() + (weeks * 7));
        loadDashboardData();
    }

    window.onload = () => {
        loadDashboardData();
    };
</script>

</body>
</html>
