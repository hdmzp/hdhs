name: 텔레그램 아침 알림 (식품방송)
on:
  schedule:
    # 매일 KST 08:30 = UTC 23:30(전날)
    # (GitHub cron은 수 분~수십 분 지연될 수 있음)
    - cron: "30 23 * * *"
  workflow_dispatch: {}  # 수동 실행 버튼
permissions:
  contents: read
jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 패키지 설치
        run: pip install requests
      - name: 텔레그램 발송 — 식품방송 리스트
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 표시할 회사/시간대를 바꾸려면 저장소 Variables 에 등록
          # 예: COMPANIES=HD,GS,CJ,LT / TIME_START=06:00 / TIME_END=23:59
          COMPANIES: ${{ vars.COMPANIES }}
          TIME_START: ${{ vars.TIME_START }}
          TIME_END: ${{ vars.TIME_END }}
          WEATHER_REGION: ${{ vars.WEATHER_REGION }}
        run: python notify/send_daily_food.py
      # 셀럽PGM 상품리스트 발송은 2026-07 사용자 요청으로 제거
      # (다시 켜려면: python notify/send_celeb_pgm.py 스텝 복원 - 스크립트는 남겨둠)
