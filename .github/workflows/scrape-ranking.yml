name: 홈쇼핑 랭킹(매일) 수집
on:
  schedule:
    # 매일 KST 07:00 = UTC 22:00(전날)
    - cron: "0 22 * * *"
  workflow_dispatch: {}  # 수동 실행 버튼
permissions:
  contents: write
  actions: write   # pages-deploy 워크플로우를 API로 dispatch하려면 필요
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 패키지 설치
        run: pip install requests
      - name: 홈쇼핑 랭킹 스크래퍼 실행
        # 파일이 scraper 폴더 안에 있으므로 경로를 수정합니다.
        run: python scraper/ranking_scraper.py
      - name: 변경사항 커밋
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ranking/*.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: 홈쇼핑 랭킹 데이터 갱신 ($(date -u +%Y-%m-%d))"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "push 실패, 재시도 ($i)"
            sleep $((RANDOM % 10 + 1))
          done
      - name: Pages 재배포 트리거
        # github-actions[bot] 계정(GITHUB_TOKEN)으로 만든 push는 GitHub이
        # 다른 워크플로우를 재귀적으로 트리거하지 않도록 막아놔서(무한루프
        # 방지 정책), 위에서 데이터를 새로 커밋해도 pages-deploy.yml의
        # push 트리거가 자동으로 반응하지 않는다. 그래서 workflow_dispatch를
        # API로 직접 호출해 배포를 강제로 큐에 넣는다. (레거시
        # /pages/builds API는 Source가 "GitHub Actions"인 저장소에는
        # 적용되지 않아 실제 워크플로우를 dispatch하는 방식으로 대체했다.)
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/pages-deploy.yml/dispatches" \
            -d '{"ref":"main"}'
